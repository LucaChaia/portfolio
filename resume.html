<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luca Chaia | Resume</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-inner">
        <a href="/" class="nav-brand">Luca Chaia</a>

        <button
          class="nav-toggle"
          aria-label="Toggle navigation"
          aria-expanded="false"
        >
          ☰
        </button>

        <ul class="nav-menu">
          <li><a href="/">Home</a></li>
          <li><a href="/interests">Interests</a></li>
          <li><a href="/projects">Projects</a></li>
          <li><a href="/resume">Resume</a></li>
          <li><a href="/socials">Socials</a></li>
        </ul>
      </div>
    </nav>
    <main class="resume-page container">
      <section class="resume-header panel">
        <h1>Resume</h1>
        <p>View my resume below or download a copy.</p>
        <a
          class="resume-download btn"
          href="assets/docs/LucaChaia_Resume_PublicFacing.pdf"
          download
        >
          Download Resume
        </a>
      </section>

      <section class="resume-viewer">
        <iframe
          src="assets/docs/LucaChaia_Resume_PublicFacing.pdf"
          title="Luca Chaia Resume"
        ></iframe>
      </section>
    </main>
    <script>
      const navToggle = document.querySelector(".nav-toggle");
      const navMenu = document.querySelector(".nav-menu");

      navToggle.addEventListener("click", () => {
        navMenu.classList.toggle("open");
        const expanded = navToggle.getAttribute("aria-expanded") === "true";
        navToggle.setAttribute("aria-expanded", String(!expanded));
      });
    </script>
  </body>
</html>
